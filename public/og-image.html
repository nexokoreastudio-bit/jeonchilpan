<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OG Image - NEXO Daily</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            font-family: 'Noto Serif KR', serif;
            padding: 120px 80px;
        }
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex: 1;
        }
        .logo-wrap img {
            max-width: 1000px;
            max-height: 600px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="logo-wrap">
        <img src="/assets/images/jeonchilpan_og_logo.png" alt="전칠판">
    </div>
    <!-- 이 페이지를 1200x1200으로 캡처해 public/assets/images/og-image.png로 저장하면 카카오톡 링크 미리보기에서 전칠판 로고가 잘 보입니다. -->
</body>
</html>
